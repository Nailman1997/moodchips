            // 加载全部影视剧
            function loadAllMovies(append = false) {
                const allMovies = [];
                
                // 收集所有影视剧数据
                Object.keys(moviesData).forEach(mood => {
                    moviesData[mood].movies.forEach(movie => {
                        // 添加分类信息（模拟）
                        const category = ['movie', 'tv', 'anime', 'documentary'][Math.floor(Math.random() * 4)];
                        allMovies.push({ ...movie, category });
                    });
                });
                
                // 筛选
                let filteredMovies = allMovies;
                
                if (currentCategory !== 'all') {
                    filteredMovies = filteredMovies.filter(movie => movie.category === currentCategory);
                }
                
                if (currentSearchTerm) {
                    filteredMovies = filteredMovies.filter(movie => 
                        movie.title.toLowerCase().includes(currentSearchTerm) ||
                        movie.actors.toLowerCase().includes(currentSearchTerm) ||
                        movie.director.toLowerCase().includes(currentSearchTerm) ||
                        movie.genre.toLowerCase().includes(currentSearchTerm)
                    );
                }
                
                // 去重
                const uniqueMovies = [];
                const seenIds = new Set();
                filteredMovies.forEach(movie => {
                    if (!seenIds.has(movie.id)) {
                        seenIds.add(movie.id);
                        uniqueMovies.push(movie);
                    }
                });
                
                // 分页
                const moviesToShow = uniqueMovies.slice(displayedMovies, displayedMovies + moviesPerPage);
                
                if (!append) {
                    allMoviesGrid.innerHTML = '';
                    displayedMovies = 0;
                }
                
                moviesToShow.forEach(movie => {
                    const movieCard = createMovieCard(movie);
                    allMoviesGrid.appendChild(movieCard);
                });
                
                displayedMovies += moviesToShow.length;
                
                // 隐藏/显示加载更多按钮
                if (displayedMovies >= uniqueMovies.length) {
                    loadMoreAllButton.classList.add('hidden');
                } else {
                    loadMoreAllButton.classList.remove('hidden');
                }
            }
            
            // 创建影视剧卡片
            function createMovieCard(movie) {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <img src="${movie.poster}" alt="${movie.title}" class="w-full h-64 object-cover">
                    <div class="overlay">
                        <h3 class="text-lg font-bold mb-2">${movie.title}</h3>
                        <div class="flex items-center mb-2">
                            <i class="fa fa-star text-yellow-400 mr-1"></i>
                            <span>${movie.rating}</span>
                            <span class="mx-2">|</span>
                            <span>${movie.year}</span>
                        </div>
                        <p class="text-sm text-gray-300 mb-2">${movie.genre}</p>
                        <button class="view-details bg-primary hover:bg-secondary text-white px-4 py-2 rounded-full text-sm transition-colors">
                            查看详情
                        </button>
                    </div>
                `;
                
                // 点击查看详情
                card.querySelector('.view-details').addEventListener('click', function() {
                    showMovieDetails(movie);
                });
                
                return card;
            }
            
            // 显示影视剧详情
            function showMovieDetails(movie) {
                const modal = document.getElementById('movie-modal');
                const movieDetails = document.getElementById('movie-details');
                
                movieDetails.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <img src="${movie.poster}" alt="${movie.title}" class="w-full rounded-lg shadow-lg">
                        </div>
                        <div>
                            <h2 class="text-2xl font-bold mb-4">${movie.title}</h2>
                            <div class="flex items-center mb-4">
                                <i class="fa fa-star text-yellow-400 mr-1"></i>
                                <span class="text-lg">${movie.rating}</span>
                                <span class="mx-2">|</span>
                                <span>${movie.year}</span>
                            </div>
                            <p class="text-gray-300 mb-4"><strong>类型：</strong>${movie.genre}</p>
                            <p class="text-gray-300 mb-4"><strong>导演：</strong>${movie.director}</p>
                            <p class="text-gray-300 mb-4"><strong>演员：</strong>${movie.actors}</p>
                            <p class="text-gray-300 mb-6">${movie.description}</p>
                            <div class="flex space-x-4">
                                <a href="${movie.trailer}" class="bg-primary hover:bg-secondary text-white px-6 py-2 rounded-full transition-colors">
                                    <i class="fa fa-play mr-2"></i>观看预告
                                </a>
                                <button class="glass hover:bg-white/20 text-white px-6 py-2 rounded-full transition-colors">
                                    <i class="fa fa-heart mr-2"></i>收藏
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                
                modal.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            }
            
            // 模态框控制
            const modal = document.getElementById('movie-modal');
            const modalBackdrop = document.getElementById('modal-backdrop');
            const closeModal = document.getElementById('close-modal');
            
            function closeModalFunc() {
                modal.classList.add('hidden');
                document.body.style.overflow = '';
            }
            
            closeModal.addEventListener('click', closeModalFunc);
            modalBackdrop.addEventListener('click', closeModalFunc);
            
            // 初始加载影视剧
            loadAllMovies();
        });
    </script>
